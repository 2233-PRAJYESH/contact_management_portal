<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Login</h1>

    <form method="POST">

        <label>Email:</label>

        <input 
        type="email" 
        name="email"
        placeholder="Enter your email"
        required>

        <label>Password:</label>

        <input 
        type="password" 
        name="password"
        placeholder="Enter your password"
        required>

        <button type="submit">Login</button>

    </form>

    <a href="/register" class="btn">Register</a>

</div>

</body>
</html>
